<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Login – GasTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        input, button { -webkit-tap-highlight-color: transparent; }
        input[type="text"], input[type="password"] { font-size: 16px; } /* prevents iOS zoom */
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-[100dvh] flex flex-col">

    <!-- Full-screen layout: logo top, form fills middle, safe area bottom -->
    <div class="flex-1 flex flex-col items-center justify-center px-5 py-10">

        <!-- Logo -->
        <div class="flex flex-col items-center mb-8">
            <div class="bg-blue-600 p-3.5 rounded-2xl mb-4 shadow-lg shadow-blue-900/40">
                <i data-lucide="flame" class="text-white w-9 h-9"></i>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">GasTrack</h1>
            <p class="text-slate-400 text-sm mt-1">Kalaimagal Gas Agencies</p>
        </div>

        <!-- Card -->
        <div class="w-full max-w-sm bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-2xl">
            <h2 class="text-base font-semibold text-white mb-5">Sign in to continue</h2>

            {% if error %}
            <div class="flex items-start gap-2 bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-xl px-4 py-3 mb-5">
                <i data-lucide="alert-circle" class="w-4 h-4 shrink-0 mt-0.5"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="/login" autocomplete="on">
                <!-- Username -->
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1.5 font-medium" for="username">Username</label>
                    <input
                        id="username" name="username" type="text"
                        autocomplete="username" required
                        inputmode="text" spellcheck="false" autocorrect="off" autocapitalize="none"
                        class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition"
                        placeholder="Enter username"
                    >
                </div>

                <!-- Password -->
                <div class="mb-6">
                    <label class="block text-sm text-slate-400 mb-1.5 font-medium" for="password">Password</label>
                    <div class="relative">
                        <input
                            id="password" name="password" type="password"
                            autocomplete="current-password" required
                            class="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 pr-12 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition"
                            placeholder="Enter password"
                        >
                        <button type="button" onclick="togglePassword()"
                            class="absolute right-0 top-0 h-full px-4 text-slate-500 active:text-slate-300 touch-manipulation">
                            <i data-lucide="eye" id="eye-icon" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit"
                    class="w-full bg-blue-600 active:bg-blue-800 text-white font-semibold py-3.5 rounded-xl transition-colors text-base touch-manipulation select-none">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <!-- Safe area spacer for iOS home bar -->
    <div class="pb-safe h-4"></div>

    <script>
        lucide.createIcons();
        function togglePassword() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
