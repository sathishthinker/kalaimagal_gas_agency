<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – GasTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-sm">

        <!-- Logo -->
        <div class="flex flex-col items-center mb-8">
            <div class="bg-blue-600 p-3 rounded-xl mb-4">
                <i data-lucide="flame" class="text-white w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">GasTrack</h1>
            <p class="text-slate-400 text-sm mt-1">Kalaimagal Gas Agencies</p>
        </div>

        <!-- Card -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-xl">
            <h2 class="text-lg font-semibold text-white mb-6">Sign in to continue</h2>

            {% if error %}
            <div class="flex items-center gap-2 bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-lg px-4 py-3 mb-5">
                <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="mb-4">
                    <label class="block text-sm text-slate-400 mb-1.5" for="username">Username</label>
                    <input
                        id="username" name="username" type="text"
                        autocomplete="username" required autofocus
                        class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition"
                        placeholder="Enter username"
                    >
                </div>
                <div class="mb-6">
                    <label class="block text-sm text-slate-400 mb-1.5" for="password">Password</label>
                    <div class="relative">
                        <input
                            id="password" name="password" type="password"
                            autocomplete="current-password" required
                            class="w-full bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 pr-10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition"
                            placeholder="Enter password"
                        >
                        <button type="button" onclick="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300">
                            <i data-lucide="eye" id="eye-icon" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function togglePassword() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
